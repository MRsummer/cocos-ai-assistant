<div class="ai-chat-container">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <span class="logo">🎮</span>
      <span class="title">Cocos AI Assistant</span>
    </div>
    <div class="header-right">
      <div class="server-status" :class="{ active: serverRunning }">
        <span class="status-dot"></span>
        <span>{{ serverRunning ? 'MCP 已连接' : 'MCP 未连接' }}</span>
      </div>
      <button class="btn-icon" @click="clearChat" title="清空对话">🗑️</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" ref="messagesContainer">
    <!-- Welcome screen -->
    <div v-if="displayMessages.length === 0 && !isLoading" class="welcome-screen">
      <div class="welcome-icon">🎮</div>
      <h2>Cocos AI Assistant</h2>
      <p>用自然语言创建游戏，AI 为你操控 Cocos Creator</p>
      <div class="quick-prompts">
        <button
          v-for="qp in quickPrompts"
          :key="qp.label"
          class="quick-prompt-btn"
          @click="useQuickPrompt(qp.prompt)"
        >
          <span class="qp-icon">{{ qp.icon }}</span>
          <span class="qp-label">{{ qp.label }}</span>
        </button>
      </div>
    </div>

    <!-- Message list (user + final assistant reply only) -->
    <div
      v-for="(msg, index) in displayMessages"
      :key="index"
      class="message"
      :class="[msg.role]"
    >
      <div class="message-avatar">
        <span v-if="msg.role === 'user'">👤</span>
        <span v-else>🤖</span>
      </div>
      <div class="message-content">
        <div v-html="formatMessage(msg.content)"></div>
      </div>
    </div>

    <!-- ═══ Plan Execution Card (the ONLY progress display) ═══ -->
    <div v-if="isLoading" class="message assistant">
      <div class="message-avatar"><span>🤖</span></div>
      <div class="message-content plan-card">
        <!-- Phase header -->
        <div class="plan-header">
          <span class="plan-phase">{{ progressPhase }}</span>
          <div class="plan-dots"><span></span><span></span><span></span></div>
        </div>

        <!-- Step checklist -->
        <div v-if="planSteps.length > 0" class="plan-steps">
          <div
            v-for="(step, i) in planSteps"
            :key="i"
            class="plan-step"
            :class="step.status"
          >
            <span class="step-icon">
              <template v-if="step.status === 'done'">✅</template>
              <template v-else-if="step.status === 'running'">⏳</template>
              <template v-else-if="step.status === 'error'">❌</template>
              <template v-else>⬜</template>
            </span>
            <span class="step-text">{{ step.text }}</span>
          </div>
        </div>

        <!-- Current detail -->
        <div v-if="progressDetail" class="plan-detail">{{ progressDetail }}</div>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="chat-input-area">
    <div class="input-wrapper">
      <textarea
        v-model="inputText"
        placeholder="描述你想创建的游戏内容..."
        @keydown="handleKeyDown"
        :disabled="isLoading"
        rows="1"
      ></textarea>
      <button
        v-if="isLoading"
        class="btn-send btn-stop"
        @click="stopGeneration"
      >⏹</button>
      <button
        v-else
        class="btn-send"
        :disabled="!inputText.trim()"
        @click="sendMessage"
      >➤</button>
    </div>
  </div>
</div>
