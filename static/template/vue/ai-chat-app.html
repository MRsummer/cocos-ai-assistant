<div class="ai-chat-container">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <span class="logo">🎮</span>
      <span class="title">Cocos AI Assistant</span>
    </div>
    <div class="header-right">
      <div class="server-status" :class="{ active: serverRunning }" @click="toggleServer">
        <span class="status-dot"></span>
        <span>{{ serverRunning ? 'MCP 已连接' : 'MCP 未连接' }}</span>
      </div>
      <button class="btn-icon" @click="clearChat" title="清空对话">🗑️</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" ref="messagesContainer">
    <!-- Welcome screen when no messages -->
    <div v-if="messages.length === 0 && !isLoading" class="welcome-screen">
      <div class="welcome-icon">🎮</div>
      <h2>Cocos AI Assistant</h2>
      <p>用自然语言创建游戏，AI 为你操控 Cocos Creator</p>
      <div class="quick-prompts">
        <button
          v-for="qp in quickPrompts"
          :key="qp.label"
          class="quick-prompt-btn"
          @click="useQuickPrompt(qp.prompt)"
        >
          <span class="qp-icon">{{ qp.icon }}</span>
          <span class="qp-label">{{ qp.label }}</span>
        </button>
      </div>
    </div>

    <!-- Message list (only user + assistant text, no tool messages) -->
    <div
      v-for="(msg, index) in displayMessages"
      :key="index"
      class="message"
      :class="[msg.role]"
    >
      <div class="message-avatar">
        <span v-if="msg.role === 'user'">👤</span>
        <span v-else>🤖</span>
      </div>
      <div class="message-content">
        <div v-html="formatMessage(msg.content)"></div>
      </div>
    </div>

    <!-- Progress card (shown during AI work) -->
    <div v-if="isLoading" class="message assistant">
      <div class="message-avatar"><span>🤖</span></div>
      <div class="message-content progress-card">
        <div class="progress-header">
          <span class="progress-phase">{{ progressPhase }}</span>
          <div class="progress-dots"><span></span><span></span><span></span></div>
        </div>
        <div class="progress-status">{{ progressDetail }}</div>
        <div v-if="completedSteps > 0" class="progress-bar-container">
          <div class="progress-bar" :style="{ width: progressPercent + '%' }"></div>
          <span class="progress-count">{{ completedSteps }} 步完成</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="chat-input-area">
    <div class="input-wrapper">
      <textarea
        v-model="inputText"
        placeholder="描述你想创建的游戏内容..."
        @keydown="handleKeyDown"
        :disabled="isLoading"
        rows="1"
      ></textarea>
      <button
        v-if="isLoading"
        class="btn-send btn-stop"
        @click="stopGeneration"
      >⏹</button>
      <button
        v-else
        class="btn-send"
        :disabled="!inputText.trim()"
        @click="sendMessage"
      >➤</button>
    </div>
  </div>
</div>
