<div class="ai-chat-container">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <span class="logo">🎮</span>
      <span class="title">Cocos AI Assistant</span>
    </div>
    <div class="header-right">
      <div class="server-status" :class="{ active: serverRunning }" @click="toggleServer">
        <span class="status-dot"></span>
        <span>{{ serverRunning ? 'MCP 已连接' : 'MCP 未连接' }}</span>
      </div>
      <button class="btn-icon" @click="clearChat" title="清空对话">🗑️</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages" ref="messagesContainer">
    <!-- Welcome screen when no messages -->
    <div v-if="messages.length === 0 && !isLoading" class="welcome-screen">
      <div class="welcome-icon">🎮</div>
      <h2>Cocos AI Assistant</h2>
      <p>用自然语言创建游戏，AI 为你操控 Cocos Creator</p>
      <div class="quick-prompts">
        <button
          v-for="qp in quickPrompts"
          :key="qp.label"
          class="quick-prompt-btn"
          @click="useQuickPrompt(qp.prompt)"
        >
          <span class="qp-icon">{{ qp.icon }}</span>
          <span class="qp-label">{{ qp.label }}</span>
        </button>
      </div>
    </div>

    <!-- Message list -->
    <div
      v-for="(msg, index) in messages"
      :key="index"
      class="message"
      :class="[msg.role, msg.type || '']"
    >
      <div class="message-avatar">
        <span v-if="msg.role === 'user'">👤</span>
        <span v-else-if="msg.role === 'system'">⚙️</span>
        <span v-else>🤖</span>
      </div>
      <div class="message-content">
        <div v-if="msg.type === 'tool'" class="tool-badge">{{ msg.content }}</div>
        <div v-else v-html="formatMessage(msg.content)"></div>
      </div>
    </div>

    <!-- Loading indicator with live status -->
    <div v-if="isLoading" class="message assistant loading">
      <div class="message-avatar"><span>🤖</span></div>
      <div class="message-content">
        <div class="typing-indicator">
          <span class="status-label">{{ statusText }}</span>
          <div class="dots"><span></span><span></span><span></span></div>
        </div>
        <!-- Live tool execution steps -->
        <div v-if="toolSteps.length > 0" class="tool-steps">
          <div v-for="(step, i) in toolSteps" :key="i" class="tool-step">
            <span class="tool-step-status">{{ step.status }}</span>
            <span class="tool-step-name">{{ step.name }}</span>
            <span class="tool-step-time">{{ step.time }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="chat-input-area">
    <div class="input-wrapper">
      <textarea
        v-model="inputText"
        placeholder="描述你想创建的游戏内容..."
        @keydown="handleKeyDown"
        :disabled="isLoading"
        rows="1"
      ></textarea>
      <button
        v-if="isLoading"
        class="btn-send btn-stop"
        @click="stopGeneration"
      >⏹</button>
      <button
        v-else
        class="btn-send"
        :disabled="!inputText.trim()"
        @click="sendMessage"
      >➤</button>
    </div>
  </div>
</div>
